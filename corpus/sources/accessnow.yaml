# Documents selected from Access Now for the corpus.
#
# Selection follows docs/corpus-inclusion-rubric.md. Access Now's #KeepItOn
# reports are continent-wide annual shutdown reports (not single-country),
# but explicitly cover all five target countries within them each year —
# per the rubric's own "primarily concerns... in at least one target
# country" test, a report whose core subject is documenting shutdowns
# including in-scope countries counts, even covering other countries too.
#
# default_acquisition: auto (2026-07-13) — reconnaissance probe (single
# GET, browser-like headers, no retry loop) returned clean HTTP 200 + real
# PDF content for both documents below. See corpus/acquisition-log.md and
# decisionlog.md, 2026-07-13, for the full multi-org probe results.

default_acquisition: auto

documents:
  - doc_id: accessnow-africa-2023-keepiton-shutdowns
    title: "Shrinking Democracy, Growing Violence: Internet Shutdowns in 2023"
    organization: Access Now
    countries: ["KE", "UG", "TZ", "ET", "RW"]
    publication_date: "2024-05-01"
    url: "https://www.accessnow.org/wp-content/uploads/2024/05/2023-KIO-Report.pdf"
    doc_type: annual_report
    source_format: pdf
    topics: ["internet_shutdown", "censorship", "network_interference"]
    language: en
    selection_rationale: >
      Access Now's #KeepItOn annual shutdown report for 2023 (283 shutdowns
      documented across 39 countries, the highest count since tracking
      began in 2016). Includes all five target countries within its
      country-by-country findings. Coverage-contribution value: documents
      the same 2023-2024 period as this corpus's OONI and Freedom House
      entries but from Access Now's own cross-country shutdown-tracking
      methodology — a genuinely different organizational account of an
      overlapping period, not a duplicate. Publication date approximate
      (month/year confirmed via the file's own URL path, exact day not
      independently confirmed from the document's title page).
    corpus_version: v1.0
    sha256: "53b6b7efcb8e9334bbe38adf64c3c1af3463f78c542f4b7910fb1f11443a1333"

  - doc_id: accessnow-africa-2024-keepiton-shutdowns
    title: "Emboldened Offenders, Endangered Communities: Internet Shutdowns in 2024"
    organization: Access Now
    countries: ["KE", "UG", "TZ", "ET", "RW"]
    publication_date: "2025-02-01"
    url: "https://www.accessnow.org/wp-content/uploads/2025/02/KeepItOn-2024-Internet-Shutdowns-Annual-Report.pdf"
    doc_type: annual_report
    source_format: pdf
    topics: ["internet_shutdown", "censorship", "network_interference"]
    language: en
    selection_rationale: >
      Access Now's #KeepItOn annual shutdown report for 2024 (21 shutdowns
      across 15 African countries, the highest ever recorded for the
      region in a single year). Explicitly documents Kenya's mid-2024
      protest-related disruption and its knock-on connectivity effects in
      Rwanda, plus continued Ethiopia (Tigray/Amhara) and Uganda
      (Facebook-blocking) restrictions — direct overlap with this corpus's
      other 2024-period entries (CIPESA's 2024 report, this org's own 2023
      report), a real coverage-contribution/cross-org-comparison case
      rather than a constructed one. Publication date approximate (per URL
      path), exact day not independently confirmed.
    corpus_version: v1.0
    sha256: "19602c14804306c565e00d54356df254e60be66a0ab954f18aab868e14257d81"

  # --- 2026-07-20 addition: 2022 and 2025 editions, extending this org's
  # coverage to four consecutive years (2022-2025) alongside the existing
  # 2023/2024 reports — same year-over-year trajectory reasoning already
  # applied to the Freedom House batch earlier the same day. Both titles
  # and URLs confirmed live via direct fetch, 2026-07-20 (not
  # pattern-inferred).

  - doc_id: accessnow-africa-2022-keepiton-shutdowns
    title: "Weapons of Control, Shields of Impunity: Internet Shutdowns in 2022"
    organization: Access Now
    countries: ["KE", "UG", "TZ", "ET", "RW"]
    publication_date: "2023-02-28"
    url: "https://www.accessnow.org/wp-content/uploads/2023/05/2022-KIO-Report-final.pdf"
    doc_type: annual_report
    source_format: pdf
    topics: ["internet_shutdown", "censorship", "network_interference"]
    language: en
    selection_rationale: >
      Access Now's #KeepItOn annual shutdown report for 2022 (187+
      shutdowns across 35 countries, the highest number of countries ever
      recorded in a single year). Confirmed live via direct fetch,
      2026-07-20 — documents Ethiopia's Tigray shutdown reaching 787+
      days by end of 2022 (2+ years continuous), Uganda's Facebook block
      persisting past its 2021 election into the full 2022 coverage year,
      and Kenya as a positive counter-example — maintained internet
      access throughout its August 2022 general election despite a
      pre-election #KeepItOn warning about platform-blocking risk.
      Coverage-contribution value: extends this org's trajectory back to
      2022, matching the same three-years-of-data reasoning already
      applied to the Freedom House Kenya/Uganda/Ethiopia/Rwanda
      2022-2024 entries, and gives Kenya a genuine before/after pair
      (2022's clean election vs. later years' disruptions noted in the
      2023/2024 reports already in this corpus).
    corpus_version: v1.0
    sha256: "5f126c12aa88372559530799a2ecf62b7a46bbc70e8bf565441c9ce0006f6ad0"

  - doc_id: accessnow-africa-2025-keepiton-shutdowns
    title: "Rising Repression Meets Global Resistance: Internet Shutdowns in 2025"
    organization: Access Now
    countries: ["KE", "UG", "TZ", "ET", "RW"]
    publication_date: "2026-03-01"
    url: "https://www.accessnow.org/wp-content/uploads/2026/03/KeepItOn-Internet-Shutdowns-2025-Annual-Report.pdf"
    doc_type: annual_report
    source_format: pdf
    topics: ["internet_shutdown", "censorship", "network_interference"]
    language: en
    selection_rationale: >
      Access Now's #KeepItOn annual shutdown report for 2025, the most
      recent complete year in this corpus's 2022-2025 window. Confirmed
      live via direct fetch, 2026-07-20 — documents Tanzania heavily (8
      shutdowns, the most of any target country that year, tied to the
      December 2025 election-related protest crackdown with reported
      unlawful use of lethal force), and notes Kenya's Telegram block
      during national exams happening "for the third year in a row" — a
      direct cross-reference to this corpus's existing OONI entry
      (ooni-ke-2025-telegram-kcse-blocking), the same event corroborated
      from a second organization's tracking methodology. Publication date
      (2026-03) follows the same lag pattern as every other annual report
      already in this corpus (each publishes several months after the
      calendar year it covers) — the document's actual subject matter is
      squarely inside the 2022-2025 window, only its publication date
      exceeds it, consistent with how the existing 2023/2024 reports are
      already treated.
    corpus_version: v1.0
    sha256: "3e650c3ca82d49b264a178423d0be1d38fee788248d7d6f1df2da5077178626d"
