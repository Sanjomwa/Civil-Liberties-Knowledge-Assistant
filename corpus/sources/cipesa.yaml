      rights, state of AI regulation, human-rights-centred governance
      recommendations) that the continent edition can't provide at the
      same depth. Kenya and Ethiopia have equivalent country-specific
      2025 SIFA AI reports in the same catalog series, confirmed to
      exist but not yet individually verified -- candidates for a
