# Documents selected from Freedom House for the corpus.
#
# Selection follows docs/corpus-inclusion-rubric.md. One "Freedom on the
# Net" (FOTN) country chapter per target country, per the architecture's
# own Acquisition Rules for Freedom House.
#
# Real finding (2026-07-13): Tanzania has NO Freedom on the Net chapter.
# Freedom House's FOTN survey covers a fixed country list and Tanzania
# isn't on it (confirmed via search -- only their separate "Freedom in the
# World" product, a different survey with a different methodology/scope,
# covers Tanzania). The architecture's assumption of "one FOTN chapter per
# target country, all five" doesn't hold for this org. Resolved by using
# FOTN chapters for the four target countries that actually have them
# (Kenya, Uganda, Ethiopia, Rwanda) rather than substituting a
# differently-scoped Freedom House product for Tanzania -- that would mix
# two different survey methodologies under one doc_type/topic set. Sam
# confirmed proceeding on this basis, 2026-07-13.
#
# Rights/licensing note (rubric Section 3): Freedom House content is
# permission-gated per docs/licensing.md, not Creative Commons. Permission
# request sent 2026-07-13 (see docs/PROJECT_CONTINUITY.md Section 7),
# awaiting response. Current course-project internal use is low-risk per
# licensing.md's own analysis; these four documents are for that internal
# use only, not any CLIO-facing redistribution, until permission is
# confirmed.
#
# default_acquisition: auto (2026-07-13) — reconnaissance probe (single
# GET, browser-like headers, no retry loop) returned clean HTTP 200 + real
# HTML content (no bot-challenge phrases matched) for all four documents.

default_acquisition: auto

documents:
  - doc_id: freedomhouse-ke-2024-fotn
    title: "Kenya: Freedom on the Net 2024 Country Report"
    organization: Freedom House
    countries: ["KE"]
    publication_date: "2024-10-01"
    url: "https://freedomhouse.org/country/kenya/freedom-net/2024"
    doc_type: country_report
    source_format: html
    topics: ["digital_rights", "censorship", "internet_freedom"]
    language: en
    selection_rationale: >
      Freedom House's 2024 Kenya chapter (coverage period roughly June
      2023-May 2024). Covers online speech arrests/detentions, a
      politically-motivated killing/abduction of online commentators, and
      Kenya's broader internet-freedom trajectory. Publication month
      approximate (FOTN series' typical October release), not independently
      confirmed from the page itself.
    corpus_version: v1.0
    sha256: "62439f4b82730d16b833a7d886895756b9f2928d05388f312e0a629dc8f6baa2"

