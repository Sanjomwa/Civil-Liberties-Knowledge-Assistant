  - doc_id: ooni-et-2023-social-media-blocking
    title: "Ethiopia: Ongoing blocking of social media"
    organization: OONI
    countries: ["ET"]
    publication_date: "2023-02-15"
    url: "https://ooni.org/post/2023-ethiopia-blocks-social-media/"
    doc_type: country_report
    source_format: html
    topics: ["censorship", "network_interference", "social_media_blocking"]
    language: en
    selection_rationale: >
      OONI's investigation into Ethiopia's nationwide block of Facebook,
      Telegram, YouTube, and TikTok starting 9-10 February 2023
      (TLS-level interference, corroborated by Google's own traffic
      data), imposed after the Ethiopian Orthodox Tewahedo Church (EOTC)
      organized protests over the government's recognition of a
      breakaway synod. Coverage contribution: documents the exact same
      event already in this corpus's Freedom House
      freedomhouse-et-2023-fotn entry (which cites the same nationwide
      platform block as one of its own Key Developments) -- a genuine
      cross-organization account of a shared event via a different
      tracking methodology (OONI's network measurements vs. Freedom
      House's narrative country survey), which is coverage contribution
      by the rubric's own definition (Section 2), not duplication. Also
      this org's first Ethiopia entry -- the corpus's most active
      live-conflict censorship story (per PROJECT_CONTINUITY.md) now has
      three organizations' independent accounts of overlapping events.
    corpus_version: v1.0
    sha256: "955b962129e0a72265b3f9c89a9a1abf7f3c0b10037cdb2d6e1311602ed0a2e9"

  # --- 2026-07-20 addition: this org's first document in a new format.
  # OONI's newer "Findings" platform (launched via the 2023-11-30 post
  # "Launch: New OONI Censorship Findings platform") publishes shorter
  # investigative write-ups separately from the classic ooni.org/post/
  # blog format every other entry in this file uses. The public page
  # (explorer.ooni.org/findings/<id>) is a JS-rendered SPA with nothing
  # extractable in its raw HTML -- the real content is served as JSON by
  # a documented API endpoint instead. Required a small acquire.py/
  # extract.py extension (source_format: json) to support -- see those
  # files' own comments. Confirmed substantive before deciding to pursue
  # this (not a short data note): ~2,200 words, multi-section, cites
  # IODA/Cloudflare Radar/Google Traffic data alongside OONI's own
  # measurements, well over this file's own 500-word floor for what
  # counts as a real document vs. a short note.

  - doc_id: ooni-ug-2026-election-shutdown-and-blocking
    title: "Uganda blocked social media following 2026 general election"
    organization: OONI
    countries: ["UG"]
    publication_date: "2026-01-23"
    url: "https://api.ooni.org/api/v1/incidents/show/352623460000"
    doc_type: incident_report
    source_format: json
    topics: ["internet_shutdown", "network_interference", "social_media_blocking", "elections"]
    language: en
    selection_rationale: >
      OONI's own technical account of the January 13-18, 2026 Uganda
      election-period internet shutdown and the subsequent WhatsApp/
      Facebook/Instagram/Twitter-X blocks once access was restored --
      the real event that motivated ADR-0006's window extension, and
      arguably the single most directly on-target document available
      for this corpus. Written by Maria Xynou, cross-validating the
      shutdown against IODA, Cloudflare Radar, and Google Traffic data
      alongside OONI's own measurement-coverage gaps, then separately
      documenting per-app blocking patterns by ASN (MTN Uganda, Roke
      Telkom, Airtel Uganda) once connectivity resumed. Coverage
      contribution: the corpus's third independent account of this
      event, alongside CIPESA's economic-impact brief
      (cipesa-ug-2026-shutdown-economic-impact) and this corpus's
      existing Freedom House country tracking -- each contributing
      genuinely different evidence (network measurement vs. economic
      quantification vs. narrative survey), not duplication. Also
      explicitly cross-references OONI's own 2016 and 2021 Uganda
      election-shutdown write-ups within its own text, noting the 2021
      and 2026 shutdowns coincidentally spanned the identical calendar
      dates (13th-18th January) -- a genuine historical-pattern
      finding, not just a single-event report. Publication date: the
      API's own `create_time` field (2026-01-23T18:44:54Z), the most
      precise date available for any entry in this corpus so far (down
      to the second, not just approximate month/day).
    corpus_version: v1.0
    sha256: "dff4a0684bb9b9ba99c26c884d33a6323cf7b2c4fea5c1c4acea5e303b815b89"
