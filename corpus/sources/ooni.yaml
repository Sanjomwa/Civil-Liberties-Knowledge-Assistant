# Documents selected from OONI for the corpus.
#
# Selection follows docs/corpus-inclusion-rubric.md and the architecture's
# own Acquisition Rules for OONI: country reports from ooni.org/reports
# filtered to target countries and 2022-2025, plus methodology pages.
# Excludes raw Explorer measurements and short data notes under 500 words.
#
# This file only records what has already been decided — one entry per
# document actually included, not a crawl target list. acquire.py reads
# this file; it does not decide what belongs here.
#
# default_acquisition: manual (2026-07-13) — ooni.org sustained a 429
# against repeated scripted requests even with a proper User-Agent and no
# retry-loop abuse, and separately, two different URLs on the site each
# turned out to sit behind different bot-challenge pages under automated
# access. This is a server-wide behavior, not specific to one document, so
# it's set here as the org default rather than repeated per document. See
# corpus/acquisition-log.md and decisionlog.md (2026-07-13) for the full
# incident history (two false starts, Opus and Fable consults).
#
# RESOLVED, CONFIRMED 2026-07-20 — the root cause was Vercel's
# bot-protection JS challenge, and the OONI team confirmed disabling it
# site-wide in their public Slack (#ooni channel, "lavamind" report ->
# Maja's fix, referenced by Sam, cross-checked directly): lavamind (Tor
# Project) reported ooni.org returning 429s to their non-JS lychee
# link-checker and to Tor Browser Safest mode; Maja (OONI) replied "We
# indeed enabled bot protection provided by Vercel due to some suspicious
# traffic... most likely fix is to disable the automatic bot protection
# all together", then confirmed "I have disabled JS challenge, ooni.org
# should be available for lychee checks and safest mode in Tor."
#
# Confirmed via the authoritative test, same day, by Claude Code in WSL
# (real network, real requests.get()): a single reconnaissance GET using
# acquire.py's own HEADERS against
# https://ooni.org/post/2023-ethiopia-blocks-social-media/ — a URL never
# previously fetched or cached by this project, so the download path
# actually executed rather than hitting the idempotent [skip] path —
# returned HTTP 200, 41184 bytes, real matching <title>, no challenge
# phrase, and passed the ADR-0005 positive title-check too. This
# supersedes the earlier browser-rendering-tool check (which used a
# different client than acquire.py itself), and is the same client/header
# set acquire.py uses in production. Flipped to `auto` on this basis.
# Original `manual` incident history (2026-07-13, two false starts, Opus
# and Fable consults) stays in corpus/acquisition-log.md and
# decisionlog.md for record — this note is intentionally not deleted,
# just marked resolved, so a future reader can see why `manual` was ever
# the default and why it changed.

default_acquisition: auto

documents:
  - doc_id: ooni-tz-2025-x-platform-blocking
    title: "OONI Analysis on the Blocking of the X Social Media Platform in Tanzania"
    organization: OONI
    countries: ["TZ"]
    publication_date: "2025-08-07"
    url: "https://ooni.org/post/2025-tanzania-blocked-twitter/"
    doc_type: country_report
    source_format: html
    topics: ["censorship", "network_interference", "social_media_blocking"]
    language: en
    selection_rationale: >
      First document processed by the ingestion pipeline (walking-skeleton
      milestone — see docs/PROJECT_CONTINUITY.md Section 6a). Also a genuine fit
      for the corpus on its own merits, independent of that: OONI is an
      approved v1 source, Tanzania is a target country, mid-2025 is inside
      the 2022-2025 window, and it documents a specific dated censorship
      event (blocking of X) with technical network-measurement evidence —
      exactly the kind of source-cited claim the assistant is meant to
      answer questions about. Originally pointed at the PDF version of
      this report under ooni.org/documents/; switched to this HTML
      companion post after the PDF path turned out to sit behind a
      JS-based bot challenge (Fable-consulted design question — see
      decisionlog.md, 2026-07-13) that a scripted client can't pass, while
      this HTML write-up covers the same finding and is openly accessible.
    corpus_version: v1.0
    sha256: "17109f2a365e5959c4d218c412cf6e851e3d51e49cc070e2ff26bda72a90a44f"

